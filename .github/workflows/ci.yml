name: CI

on:
  pull_request:
  push:
    branches: [master]

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-node@v5
        with:
          node-version: "24"
          cache: "npm"

      - run: npm ci

      - name: Typecheck
        run: npm run typecheck

      - name: Lint
        run: npm run lint

      - name: Test with coverage
        run: npm run test:coverage

      - name: Build app
        run: npm run build

      - name: Build action
        run: npm run build:action

      - name: Verify committed action bundle
        run: |
          if [ -n "$(git status --porcelain -- action/dist)" ]; then
            echo "Committed action bundle is out of date. Regenerate with npm run build:action (or the repo build command) and commit action/dist."
            git status --short -- action/dist
            exit 1
          fi

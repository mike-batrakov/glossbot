name: Bug report
description: Report a bug or broken behavior in GlossBot.
title: "[Bug]: "
labels:
  - bug
body:
  - type: markdown
    attributes:
      value: |
        Thanks for filing a bug report.
        
        GlossBot is still in early public development, so please include enough detail for someone new to the issue to reproduce it quickly.
  - type: textarea
    id: summary
    attributes:
      label: What happened?
      description: Describe the bug clearly and concisely.
      placeholder: Tell us what broke.
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: What did you expect to happen?
      placeholder: Describe the expected behavior.
    validations:
      required: true
  - type: textarea
    id: steps
    attributes:
      label: Steps to reproduce
      description: Include exact commands, payloads, or setup details if relevant.
      placeholder: |
        1. ...
        2. ...
        3. ...
    validations:
      required: true
  - type: textarea
    id: environment
    attributes:
      label: Environment
      description: Share any relevant versions or runtime details.
      placeholder: |
        - OS:
        - Node.js:
        - npm:
        - GlossBot branch or commit:
  - type: textarea
    id: notes
    attributes:
      label: Additional context
      description: Logs, screenshots, stack traces, or related links.
